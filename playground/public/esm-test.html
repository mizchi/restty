<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>restty ESM Bundle Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1a1a2e; color: #e0e0e0; font-family: system-ui, sans-serif; }
    h1 { color: #7fdbca; font-size: 18px; padding: 16px; }
    p, .info { color: #999; font-size: 14px; padding: 0 16px 16px; }
    #terminal { border: 1px solid #333; height: 500px; margin: 0 16px; width: 800px; }
    code { background: #2a2a3e; border-radius: 3px; font-size: 12px; padding: 2px 6px; }
  </style>
</head>
<body>
  <h1>restty standalone ESM bundle test</h1>
  <p>Loads restty from a single ESM file without additional build tooling.</p>
  <div id="terminal"></div>
  <div class="info" id="status">Loading...</div>

  <script type="module">
    import { Restty, createRestty, listBuiltinThemeNames } from "../../dist/restty.esm.js";

    const status = document.getElementById("status");
    const root = document.getElementById("terminal");

    try {
      const themes = listBuiltinThemeNames();
      status.textContent =
        `Module loaded. ${themes.length} built-in themes available. ` +
        `Restty: ${typeof Restty}. createRestty: ${typeof createRestty}.`;

      const restty = new Restty({
        root,
        theme: "Dracula",
        fonts: { regular: "monospace" },
      });

      status.textContent += ` Terminal created: ${String(Boolean(restty))}.`;
    } catch (error) {
      const message = error instanceof Error ? error.message : String(error);
      status.textContent = `Error: ${message}`;
      console.error(error);
    }
  </script>
</body>
</html>
